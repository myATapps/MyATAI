name: Build Android APK
on: [push, workflow_dispatch]

# 🎯 آپ کا آئیڈیا: پائتھن اور جاوا کی طرح اینڈرائیڈ 37 کے پاتھس کو بالکل شروع میں ہی گلوبل لاک کرنا
env:
  ANDROID_HOME: '/home/runner/android-sdk'
  ANDROIDSDK: '/home/runner/android-sdk'
  PATH: '/home/runner/android-sdk/cmdline-tools/latest/bin:/home/runner/android-sdk/platform-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🎯 یہاں ہم نے شروع میں سیٹ کیے گئے پاتھس پر مینوئلی ورژن 37 ڈاؤن لوڈ کر کے لائسنس اوکے کر دیے
      - name: Pre-Install Android SDK 37 & Accept Licenses
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          
          # گوگل کے سرور سے ٹولز لانا
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          
          # لائسنس آٹو ایکسیپٹ کرنا
          echo "y" | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "build-tools;37.0.0" "platforms;android-34"
          echo "اینڈرائیڈ ٹولز ورژن 37 پاتھ میں لاک ہو گئے!"

      - name: Run Buildozer Smoothly
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          # بلڈوزر اب مجبور ہے کیونکہ مین پاتھ اوپر گلوبل سیٹ ہو چکا ہے
          buildozer android debug \
            --androidapi=34 \
            --androidndk=25b \
            --ndk-api=34 \
            --build-tools-version=37.0.0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/*/bin/*.apk
          if-no-files-found: error
