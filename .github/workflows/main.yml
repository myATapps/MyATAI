name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 👑 ۱۔ بلڈوزر کا متوقع ڈھانچہ پہلے ہی تیار کرنا اور مینیجر کاپی کرنا
      - name: Build Exact SDK Structural Layout
        run: |
          # بلڈوزر کے دونوں ممکنہ فولڈرز مینوئلی بنانا
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # سرور پر موجود آفیشل مینیجر کو بلڈوزر کے فولڈرز میں بھرنا
          if [ -d "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" ]; then
            cp -r /usr/local/lib/android/sdk/cmdline-tools/latest/bin/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/
            cp -r /usr/local/lib/android/sdk/cmdline-tools/latest/bin/* ~/.buildozer/android/platform/android-sdk/tools/bin/
          fi
          
          # سرور کے مینیجر سے پہلے ہی ورژن 37 ڈاؤن لوڈ کروا لینا
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH
          echo "y" | sdkmanager "build-tools;37.0.0" "platform-tools" || true
          
          # ڈاؤن لوڈ شدہ فائلز بلڈوزر کے فولڈر میں ٹرانسفر کرنا
          if [ -d "/usr/local/lib/android/sdk/build-tools/37.0.0" ]; then
            mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools
            cp -r /usr/local/lib/android/sdk/build-tools/37.0.0 ~/.buildozer/android/platform/android-sdk/build-tools/
          fi
          
          # ڈیجیٹل لائسنس لاک فائلز بنانا
          echo -e "24333f8a63b6825ea50157f88340d3265b9099d6\n8cce3afb685bc2fac41c43633d1a37114b35261f\nde5b3312b299b25654117e0a7991475c293a61cd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "بیک گراؤنڈ فولڈرز اور ٹولز بالکل تیار ہیں!"

      # 🚀 ۲۔ بلڈوزر رن کرنا لمیٹڈ ٹائم 'yes' کمانڈ کے ساتھ
      - name: Run Buildozer with Limited Time Yes
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          export ANDROID_FORCE_ACCEPT_LICENSES=1
          
          echo "بلڈوزر شروع ہو رہا ہے، لائسنس بائی پاس کے لیے لمیٹڈ 'yes' ایکٹو ہے..."
          
          # 🎯 جادوئی لاجک: 'yes' کا پائپ صرف 60 سیکنڈ چلے گا تاکہ پائپ ٹوٹے بغیر لائسنسز اوکے ہو جائیں
          timeout 60s yes | buildozer -v android debug || true
          
          echo "محدود وقت پورا ہوا، اب فائنل بلڈ کمپلیٹ کی جا رہی ہے..."
          # اب بلڈوزر کو کھلا رن دیا تاکہ وہ بغیر رکاوٹ کے APK فائل تیار کرے
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: bin/*.apk
          if-no-files-found: error
