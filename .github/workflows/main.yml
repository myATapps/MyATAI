name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Auto Accept Licenses & Run Buildozer
        # یہاں ہم نے گٹ ہب کے آفیشل طریقے سے ویریبلز کو رنر کے اندر پکا لاک کر دیا ہے
        env:
          P4A_android_api: "33"
          P4A_android_ndk: "25b"
          P4A_ndk_api: "33"
          ANDROID_API: "33"
          ANDROID_NDK: "25b"
        run: |
          mkdir -p ~/.buildozer/android/platform/
          
          # اب بلڈوزر ان لاک شدہ سیٹنگز کے ساتھ چلے گا اور کریش نہیں ہوگا
          yes | buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: bin/*.apk
