name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # گوگل کا آفیشل ٹول جو اینڈرائیڈ 33 کی سیٹنگز لوڈ کرے گا
      - name: Set up Android SDK & Pre-Load 33
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.0
          log-accepted-licenses: false

      # 🎯 سب سے پکا توڑ: بنا کسی پائپ (|) کے، یہ اینڈرائیڈ کا اپنا آفیشل کمانڈ ٹول ہے جو تمام لائسنس فائلز کو پہلے ہی سائن کر دے گا
      - name: Official Android License Acceptor (No Pipes)
        run: |
          sdkmanager --licenses

      # 🎯 بلڈوزر کلین رن (بغیر کسی 'yes' اور بغیر کسی بروکن پائپ کے)
      - name: Run Buildozer Locked on 33
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          # بلڈوزر کو زبردستی سسٹم کے اینڈرائیڈ 33 والے پاتھ پر سیٹ کرنا
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROIDAPI=33
          
          # اب یہ بالکل سیدھی کمانڈ چلے گی، کوئی پائپ نہیں ٹوٹے گا
          buildozer android debug --androidapi=33 --build-tools-version=33.0.0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/*/bin/*.apk
          if-no-files-found: error
