name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🎯 اصل جادو: گٹ ہب خود اینڈرائیڈ کے ٹولز اور لائسنس ورژن 33 پر سیٹ کرے گا
      - name: Set up Android SDK & Force Version 33
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.0
          log-accepted-licenses: false

      - name: Run Buildozer Forcing System SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/
          
          # انوائرمنٹ سیٹ کرنا
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          # 🎯 بلڈوزر کی آنکھیں بند کر کے اسے گٹ ہب والے اینڈرائیڈ پاتھ پر سیٹ کرنا
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROIDAPI=33
          
          # بغیر کسی 'yes' یا پائپ کے بالکل کلین رن
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/*/bin/*.apk
          if-no-files-found: error
