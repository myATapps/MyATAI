name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # یہاں ہم نے ورچوئل ڈسپلے (xvfb) اور ضروری گرافکس لائبریریاں شامل کر دی ہیں
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip xvfb x11-utils
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Pre-Install Core Android SDK and Core Folders
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          mkdir -p ~/.buildozer/android/platform
          
          if [ -d "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" ]; then
            cp -r /usr/local/lib/android/sdk/cmdline-tools/latest/bin/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/
            cp -r /usr/local/lib/android/sdk/cmdline-tools/latest/bin/* ~/.buildozer/android/platform/android-sdk/tools/bin/
          fi
          
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH
          echo "y" | sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-33" || true
          
          if [ -d "/usr/local/lib/android/sdk/build-tools/34.0.0" ]; then
            mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools
            cp -r /usr/local/lib/android/sdk/build-tools/34.0.0 ~/.buildozer/android/platform/android-sdk/build-tools/
          fi
          
          echo -e "24333f8a63b6825ea50157f88340d3265b9099d6\n8cce3afb685bc2fac41c43633d1a37114b35261f\nde5b3312b299b25654117e0a7991475c293a61cd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          if [ ! -d "~/.buildozer/android/platform/python-for-android" ]; then
            git clone https://github.com/kivy/python-for-android.git ~/.buildozer/android/platform/python-for-android || true
          fi
          
          echo "اینڈرائیڈ ٹولز اور فولڈرز بالکل تیار ہیں!"

      # 🚀 بلڈوزر رن (ورچوئل ڈسپلے ایکٹیویشن کے ساتھ)
      - name: Run Buildozer Smoothly with Virtual Display
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          export ANDROID_FORCE_ACCEPT_LICENSES=1
          
          echo "ورچوئل اسکرین سٹارٹ کی جا رہی ہے..."
          # کِوی کو کریش ہونے سے بچانے کے لیے ورچوئل اسکرین آن کرنا
          xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: bin/*.apk
          if-no-files-found: error
