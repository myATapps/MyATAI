name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🎯 جادوئی سٹیپ: یہ گوگل کا آفیشل ایکشن ہے جو سرور پر موجود اینڈرائیڈ کے تمام لائسنسز (بشمول 37) کو پہلے ہی ایکسیپٹ کر دیتا ہے
      - name: Pre-Accept All Android Licenses Legally
        uses: android-actions/setup-android@v3
        with:
          log-accepted-licenses: false

      # 🎯 بلڈوزر بالکل فری ہو کر چلے گا، اسے اینڈرائیڈ مینیجر بھی ملے گا اور لائسنس بھی اوکے ملیں گے
      - name: Run Buildozer Smoothly
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          # کوئی ایکسٹرا پاتھ اوور رائیڈ نہیں کرنا، بلڈوزر کو خود اپنا صاف فولڈر بنانے دیں
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: bin/*.apk
          if-no-files-found: error
