name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==3.0.10

      - name: Accept Android SDK Licenses Officially
        run: |
          # گوگل کا آفیشل طریقہ: بلڈوزر کے رن ہونے سے پہلے ہی لائسنس فائل بنا دیتے ہیں
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # یہ اینڈرائیڈ کے آفیشل لائسنس ہیشز ہیں جو بلڈوزر کو چپ کروا دیں گے
          echo -e "\n2410ea9d0668f1c67c3b905693433097a3d2492e" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n8516d1387e2531dd32d47d4e30b6df35b441da02" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      - name: Build with Buildozer
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: bin/*.apk
