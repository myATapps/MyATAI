name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Auto Accept Licenses & Run Buildozer
        run: |
          # 1. بلڈوزر کا پلیٹ فارم فولڈر بنانا
          mkdir -p ~/.buildozer/android/platform/
          
          # 2. اینڈرائیڈ لائسنسز کو بیک گراؤنڈ میں خودکار قبول کرنا
          yes | sdkmanager --licenses || true
          
          # 3. بلڈوزر کو نان-انٹرایکٹو موڈ میں انوائرمنٹ ورژنز کے ساتھ چلانا
          P4A_android_api=33 P4A_android_ndk=25b P4A_ndk_api=33 buildozer android debug --bba=sdl2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: bin/*.apk
