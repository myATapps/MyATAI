name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Auto Accept Licenses & Run Buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform/
          
          yes | buildozer android debug --androidapi=33 --androidndk=25b --ndk-api=33

      # 🎯 کوڈ کے بالکل اینڈ میں یہ نیا سٹیپ ایڈ کیا ہے تاکہ بلڈوزر کو جاوا 17 کی کمانڈ مل سکے
      - name: Force Java 17 for Toolchain
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "PATH=$JAVA_HOME_17_X64/bin:$PATH" >> $GITHUB_ENV
          - name: Auto Accept Licenses & Run Buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform/
          
          # 🎯 کوڈ میں پکا اضافہ: بلڈوزر چلنے سے پہلے جاوا 17 کی کمانڈ کو اوپر سیٹ کر دیا
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH

          # یہ آپ کا اپنا اصل اور بالکل ٹھیک کوڈ ہے جو نیچے ویسے ہی موجود ہے
          yes | buildozer android debug --androidapi=33 --androidndk=25b --ndk-api=33
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: bin/*.apk
