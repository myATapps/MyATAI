name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # گوگل کا آفیشل لائسنس ہینڈلر سرور پر انسٹال کرنا
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-licenses: false

      - name: Run Buildozer Forcing Stable Version
        run: |
          mkdir -p ~/.buildozer/android/platform/
          
          # جاوا 17 اور پائتھن ٹول چین سیٹ کرنا
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          # 🎯 فائنل فکس: کمانڈ کے اندر ہی زبردستی ورژن 33.0.0 پر لاک کر دینا تاکہ spec فائل کا رولا ہی ختم ہو جائے
          buildozer android debug \
            --androidapi=33 \
            --androidndk=25b \
            --ndk-api=33 \
            --build-tools-version=33.0.0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/*/bin/*.apk
          if-no-files-found: error
