name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🎯 آپ کا آئیڈیا: اینڈرائیڈ ایس ڈی کے کو شروع میں ہی مینوئلی انسٹال اور لاک کرنا
      - name: Pre-Install Android SDK 33 & Accept Licenses
        run: |
          # اینڈرائیڈ مینیجر کے لیے فولڈر بنانا
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          
          # گوگل کے آفیشل سرور سے کمانڈ ٹولز ڈاؤن لوڈ کرنا
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          
          # پاتھ سیٹ کر کے زبردستی بلڈ ٹولز 33.0.0 ڈاؤن لوڈ کرنا اور لائسنس اوکے کرنا
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
          echo "y" | sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "build-tools;33.0.0" "platforms;android-33"
          echo "اینڈرائیڈ ٹولز ورژن 33 کامیابی سے انسٹال ہو گئے!"

      - name: Run Buildozer Forcing Pre-Installed SDK
        run: |
          # جاوا اور پائتھن ٹول چین کا انوائرمنٹ ریڈی کرنا
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          # 🎯 بلڈوزر کو مجبور کرنا کہ وہ صرف اور صرف اوپر والے فولڈر کو ہی دیکھے
          export ANDROIDSDK=$HOME/android-sdk
          export ANDROIDNDK=$HOME/.buildozer/android/platform/android-ndk-r25b
          
          # بلڈوزر کے اپنے اندرونی گلوبل پاتھس کو بھی اوور رائیڈ کرنا
          buildozer android debug \
            --androidapi=33 \
            --androidndk=25b \
            --ndk-api=33 \
            --build-tools-version=33.0.0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/*/bin/*.apk
          if-no-files-found: error
