name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 👑 سب سے پاورفل سٹیپ: ورژن 37 کو پہلے ہی مینوئلی ڈاؤن لوڈ اور لائسنس اوکے کرنا
      - name: Pre-Install Android Build-Tools 37 and Accept Licenses
        run: |
          # 1. بلڈوزر کا متوقع فولڈر پہلے ہی مینوئلی تیار کرنا
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # 2. سرور کے آفیشل مینیجر کا راستہ ایکٹو کرنا
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH
          
          # 3. تمام لائسنسز کو آٹو 'yes' کرنا
          echo "y" | sdkmanager --licenses || true
          
          # 4. 🎯 زبردستی ورژن 37 کو پہلے ہی ڈاؤن لوڈ کرنا تاکہ بعد میں انٹرنیٹ کا رولا نہ رہے
          echo "y" | sdkmanager "build-tools;37.0.0" "platform-tools" "platforms;android-35" || true
          
          # 5. ڈاؤن لوڈ شدہ بالکل ریڈی فائلز اور لائسنس بلڈوزر کے فولڈر میں کاپی کرنا
          if [ -d "/usr/local/lib/android/sdk/build-tools/37.0.0" ]; then
            mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools
            cp -r /usr/local/lib/android/sdk/build-tools/37.0.0 ~/.buildozer/android/platform/android-sdk/build-tools/
          fi
          
          # لائسنس فولڈر بھی بیک اپ کاپی کرنا
          cp -r /usr/local/lib/android/sdk/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true
          
          echo "ورژن 37 ڈاؤن لوڈ ہو گیا اور بلڈوزر کے لیے لاک ہو گیا!"

      # 🚀 اب بلڈوزر رن کریں، اسے سب کچھ پکا پکایا ملے گا
      - name: Run Buildozer Smoothly
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          export ANDROID_FORCE_ACCEPT_LICENSES=1
          
          # تفصیلی لاگ کے ساتھ رن
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: bin/*.apk
          if-no-files-found: error
