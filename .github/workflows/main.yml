name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    # 🎯 کِوی کا آفیشل ماحول جس میں اینڈرائیڈ لائسنس پہلے سے اوکے ہوتے ہیں
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Buildozer Smoothly
        run: |
          # ہوم ڈائریکٹری سیٹ کرنا تاکہ کنٹینر میں کوئی پاتھ ایرر نہ آئے
          export HOME=/root
          
          # 🎯 بغیر کسی 'yes' یا پائپ کے، بلڈوزر بالکل سیدھا اور کلین چلے گا
          buildozer android debug --androidapi=33 --androidndk=25b --ndk-api=33

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: bin/*.apk
