name: BuildAPK
on: [push, workflow_dispatch]
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ArtemSerebrennikov/buildozer-action@v1
        with:
          command: buildozer android debug
          buildozer_version: master
      - uses: actions/upload-artifact@v4
        with:
          name: MyAPK
          path: bin/*.apk
