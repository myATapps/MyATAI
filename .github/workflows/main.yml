name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🎯 کِوی کا اصل آفیشل ایکشن (درست ورژن کے ساتھ): یہ لائسنس اور پائپ کا رولا خود ہی ختم کر دے گا
      - name: Build APK with Official Buildozer Action
        uses: kivy/buildozer-action@master
        id: buildozer
        with:
          command: 'buildozer android debug'

      # 🎯 فائنل بنی ہوئی اے پی کے فائل کو ڈاؤن لوڈ کے لیے سمری پیج پر لانا
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: ${{ steps.buildozer.outputs.artifact-path }}
