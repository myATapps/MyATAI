name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Auto Accept Licenses & Run Buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform/
          
          # جاوا 17 کا انوائرمنٹ سیٹ کرنا
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH

          # پائتھن ٹول چین کو ریڈی کرنا
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH

          # 🎯 پکا فکس: بلڈوزر چلنے سے پہلے اینڈرائیڈ کے سارے لائسنس خودکار قبول کرنا
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n24106d7b501f8c99b31f130edcf4d74891793285\nd56f11ed256b468ad58d34168b49277fbe6c94f1\n266017f81e925049a12077f722157e494e0946fc\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # اب آپ کا اپنا اصل بلڈوزر کوڈ بغیر کسی 'yes |' کے رولے کے صاف چلے گا
          buildozer android debug --androidapi=33 --androidndk=25b --ndk-api=33

      - name: Upload APK
        uses: actions/artifact@v4
        with:
          name: My-App-APK
          path: bin/*.apk
