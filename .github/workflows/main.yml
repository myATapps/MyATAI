name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      # 🎯 سٹیپ 1: سرور پر اینڈرائیڈ کے کمانڈ لائن ٹولز مینوئلی انسٹال کرنا
      - name: Install Android CMD Tools & Force Accept Licenses
        run: |
          mkdir -p $HOME/android-cmd
          cd $HOME/android-cmd
          # گوگل کے آفیشل سرور سے ٹولز ڈاؤن لوڈ کرنا
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/bin cmdline-tools/latest/
          mv cmdline-tools/lib cmdline-tools/latest/
          
          # 🎯 یہاں ہم زبردستی ورژن 33.0.0 کو مینوئلی ڈاؤن لوڈ کر کے لائسنس اوکے کر رہے ہیں
          export PATH=$HOME/android-cmd/cmdline-tools/latest/bin:$PATH
          echo "y" | sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "build-tools;33.0.0" "platforms;android-33"
          echo "لائسنس مینوئلی منظور ہو گئے۔"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Buildozer Forcing Local SDK
        run: |
          # جاوا اور پائتھن ٹول چین سیٹ کرنا
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          # 🎯 سٹیپ 2: بلڈوزر کو بتانا کہ انٹرنیٹ پر مت جاؤ، جو اوپر ہم نے ڈاؤن لوڈ کیا ہے اسی کو استعمال کرو
          export ANDROIDSDK=$HOME/android-sdk
          export ANDROIDNDK=$HOME/.buildozer/android/platform/android-ndk-r25b
          
          # اب بلڈوزر بنا کسی پائپ، بنا کسی 'yes' کے سیدھا اور کلین چلے گا
          buildozer android debug --androidapi=33 --androidndk=25b --ndk-api=33 --build-tools-version=33.0.0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/*/bin/*.apk
          if-no-files-found: error
