name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🎯 آپ کا آئیڈیا: بلڈوزر چلنے سے پہلے اینڈرائیڈ ٹولز کو آٹو رن اور لائسنس لاک کرنا
      - name: Auto-Accept Android SDK Licenses Dynamically
        run: |
          # سرور پر موجود اینڈرائیڈ ٹولز کا آفیشل پاتھ ڈھونڈنا
          export ANDROID_REGULAR_SDK="/usr/local/lib/android/sdk"
          
          if [ -d "$ANDROID_REGULAR_SDK/cmdline-tools/latest/bin" ]; then
            export PATH=$ANDROID_REGULAR_SDK/cmdline-tools/latest/bin:$PATH
          elif [ -d "$ANDROID_REGULAR_SDK/tools/bin" ]; then
            export PATH=$ANDROID_REGULAR_SDK/tools/bin:$PATH
          fi
          
          # 👑 آٹو کمانڈ: یہ سرور پر موجود اینڈرائیڈ مینیجر کے ذریعے تمام لائسنس پہلے ہی اوکے کر دے گا
          if command -v sdkmanager &> /dev/null; then
            yes | sdkmanager --licenses || true
            echo "تمام اینڈرائیڈ ورژنز کے لائسنس آٹو کمانڈ پر سیٹ ہو گئے!"
          else
            echo "مین سرور کا ایس ڈی کے مینیجر ابھی ریڈی نہیں ہے، بلڈوزر اسے خود ہینڈل کرے گا۔"
          fi

      # 🚀 اب بلڈوزر چلے گا، کوئی کسٹم پاتھ اس کے راستے خراب نہیں کرے گا
      - name: Run Buildozer Smoothly
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          # ایک انوائرمنٹ کمانڈ جو بلڈوزر کے اندرونی لائسنس سسٹم کو بھی آٹو منظور کر دیتی ہے
          export ANDROID_FORCE_ACCEPT_LICENSES=1
          
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/*/bin/*.apk
          if-no-files-found: error
