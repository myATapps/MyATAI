name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # یہ کِوی کا آفیشل بلڈوزر ایکشن ہے جو جاوا، اینڈرائیڈ، اور لائسنس کے تمام ایررز خود ہی فکس کر دیتا ہے
      - name: Build with Buildozer Action
        uses: ArtemSsh/buildozer-action@v1
        with:
          buildozer_version: stable
          command: buildozer android debug
          repository_root: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: bin/*.apk
