name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🎯 سب سے اہم سٹیپ: یہ گوگل کے سارے ٹولز اور لائسنس پہلے سے خود ہی ایکسیپٹ کر کے ریڈی کر دے گا
      - name: Set up Android SDK & Accept Licenses
        uses: android-actions/setup-android@v3
        with:
          log-accepted-licenses: false

      # 🎯 یہ کمانڈز آپ کی buildozer.spec فائل کی سیٹنگز کو اینڈرائیڈ سرور کے مطابق فکس کریں گی
      - name: Auto Fix Buildozer Spec Settings
        run: |
          sed -i 's/^#\? \?android.api =.*/android.api = 33/g' buildozer.spec
          sed -i 's/^#\? \?android.ndk =.*/android.ndk = 25b/g' buildozer.spec
          sed -i 's/^#\? \?android.build_tools_version =.*/android.build_tools_version = 33.0.0/g' buildozer.spec

      - name: Run Buildozer Smoothly
        run: |
          # انوائرمنٹ سیٹ کرنا
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          # 🎯 اب کوئی پائپ 'yes' یا '|| true' نہیں چلے گا۔ بلڈوزر بالکل کلین اور آفیشل رن ہوگا
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: bin/*.apk
          if-no-files-found: error
