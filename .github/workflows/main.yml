name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🎯 بالکل درست آفیشل ایکشن: یہ کِوی کا اپنا آفیشل ٹول ہے جو لائسنس خود ہینڈل کرتا ہے
      - name: Build APK with Buildozer Action
        uses: kivy/buildozer-action@v1
        id: buildozer
        with:
          command: 'buildozer android debug --androidapi=33 --androidndk=25b --ndk-api=33'

      # 🎯 فائنل بنی ہوئی اے پی کے فائل کو ڈاؤن لوڈ کے لیے ریڈی کرنا
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: .buildozer/android/platform/build-armeabi-v7a_arm64-v8a/dists/*/*/bin/*.apk
