name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 👑 سب سے بڑا ماسٹر ہیک: سرور کے بنے بنائے اینڈرائیڈ لائسنسز کو آٹو سائن کرنا
      - name: Accept All Android SDK Licenses
        run: |
          # سرور کے آفیشل ٹولز کا پاتھ ایکٹو کرنا
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH
          # تمام لائسنسز کو آٹو 'yes' کرنا
          echo "y" | sdkmanager --licenses || true
          echo "سرور کے اپنے اینڈرائیڈ لائسنسز کامیابی سے لاک ہو گئے!"

      # 🚀 بلڈوزر اب گٹ ہب کا اپنا آفیشل فولڈر استعمال کرے گا، کوئی فائل مس نہیں ہوگی
      - name: Run Buildozer Forcing GitHub SDK Path
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          # 🎯 بلڈوزر کو مجبور کرنا کہ وہ سرور کا فیکٹری پاتھ اٹھائے
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROIDNDK=$ANDROID_HOME/ndk/27.3.13750724
          export ANDROID_FORCE_ACCEPT_LICENSES=1
          
          # تفصیلی لاگ کے ساتھ رن
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: bin/*.apk
          if-no-files-found: error
