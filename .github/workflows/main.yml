name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev unzip
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🎯 سٹیپ 1: گوگل کا آفیشل ٹول جو اینڈرائیڈ کا مین سیٹ اپ لوڈ کرے گا
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 🎯 سٹیپ 2: سب سے ضروری توڑ! یہ کمانڈ بلڈوزر کے اپنے خفیہ فولڈر میں جا کر ورژن 37 کے لائسنس پہلے ہی منظور (Accept) کر دے گی
      - name: Force Accept Buildozer Licenses for Version 37
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/
          # بلڈوزر کے اپنے مینیجر روٹ پر جا کر لائسنس اوکے کرنا
          yes | sdkmanager --sdk_root=/home/runner/.buildozer/android/platform/android-sdk "build-tools;37.0.0" "platforms;android-34" || true
          echo "ورژن 37 کے لائسنس زبردستی منظور کر لیے گئے ہیں!"

      # 🎯 سٹیپ 3: اب بلڈوزر رن کریں، کوئی 'yes |' نہیں لگے گا تاکہ پائپ لائن نہ ٹوٹے
      - name: Run Buildozer Smoothly
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          python -m pip install --upgrade python-for-android
          export PATH=$pythonLocation/bin:$PATH
          
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AT-AI-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/*/bin/*.apk
          if-no-files-found: error
